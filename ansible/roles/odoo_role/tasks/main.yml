---
# Tasks to deploy Odoo using a docker-compose template
- name: Render docker-compose for Odoo
  template:
    src: docker-compose.yml.j2
    dest: /tmp/odoo-docker-compose.yml

- name: Copy compose file to remote host
  copy:
    src: /tmp/odoo-docker-compose.yml
    dest: /tmp/odoo-docker-compose.yml

- name: Ensure host path exists for Odoo data
  file:
    path: "{{ odoo_volume_host_path }}"
    state: directory
    mode: '0777'

- name: Launch Odoo with docker-compose
  command: docker-compose -f /tmp/odoo-docker-compose.yml up -d
  args:
    chdir: /
